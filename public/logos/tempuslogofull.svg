<svg width="680" height="210" viewBox="0 0 680 210" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .wordmark { font-family: 'Geist', latin; font-size: 52px; font-weight: 500; fill: #1a1a1a; letter-spacing: -1px; }
      .tagline  { font-family: 'Geist Mono', monospace; font-size: 15px; font-weight: 400; fill: #666666; letter-spacing: 2px; }
    </style>
  </defs>

  <!-- Outer rounded rect -->
  <rect x="40" y="20" width="110" height="110" rx="16" fill="none" stroke="#3B7BE8" stroke-width="2.5"/>

  <!-- Top header bar -->
  <rect x="40" y="20" width="110" height="26" rx="16" fill="#3B7BE8"/>
  <rect x="40" y="32" width="110" height="14" fill="#3B7BE8"/>

  <!-- Inner grid lines - vertical -->
  <line x1="77" y1="46" x2="77" y2="130" stroke="#3B7BE8" stroke-width="1.5" opacity="0.35"/>
  <line x1="113" y1="46" x2="113" y2="130" stroke="#3B7BE8" stroke-width="1.5" opacity="0.35"/>

  <!-- Inner grid lines - horizontal -->
  <line x1="40" y1="72" x2="150" y2="72" stroke="#3B7BE8" stroke-width="1.5" opacity="0.35"/>
  <line x1="40" y1="98" x2="150" y2="98" stroke="#3B7BE8" stroke-width="1.5" opacity="0.35"/>

  <!-- Filled blocks -->
  <rect x="44" y="76" width="29" height="18" rx="4" fill="#3B7BE8" opacity="0.9"/>
  <rect x="80" y="50" width="29" height="18" rx="4" fill="#3B7BE8" opacity="0.9"/>
  <rect x="116" y="102" width="30" height="18" rx="4" fill="#3B7BE8" opacity="0.7"/>
  <rect x="44" y="102" width="29" height="18" rx="4" fill="#3B7BE8" opacity="0.5"/>

  <!-- Wordmark -->
  <text x="170" y="92" class="wordmark">Tempus</text>

  <!-- Tagline -->
  <text x="172" y="122" class="tagline">YOUR WEEK, AT A GLANCE</text>

  <!-- Thin rule -->
  <line x1="40" y1="158" x2="444" y2="158" stroke="#e0e0e0" stroke-width="1"/>
</svg>

name: Jest Testing
on: [workflow_dispatch, pull_request]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      TZ: 'Pacific/Wellington'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run Jest tests
        run: pnpm jest --ci
